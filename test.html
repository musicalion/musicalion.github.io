處理即可安全丟棄儲存媒體。","對儲存媒體進行實體破壞後，不須確認資料是否已被徹底銷毀。","應先安全的刪除資料或進行實體的破壞。","無需特別處理，直接丟棄即可。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["應先安全的刪除資料或進行實體的破壞。"]},{"question_number":508,"title":"防毒軟體在資通安全防護與偵測措施中扮演重要角色，其主要用途是防範下列哪一類的惡意程式入侵電腦軟體或系統？","option":["僅限於防範傳統型態的電腦病毒。","蠕蟲、間諜軟體、後門程式及木馬程式。","主要用於加密網路通訊，而非防範惡意程式。","僅限於防範勒索軟體，不包含其他惡意程式。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["蠕蟲、間諜軟體、後門程式及木馬程式。"]},{"question_number":509,"title":"關於防毒軟體的管理重點，以下哪項敘述是不正確？","option":["應定期自動更新病毒碼。","病毒感染的事件與趨勢應定期分析。","應避免未安裝防毒軟體的電腦上線。","「個人電腦與伺服器防毒系統」與「防毒匣道系統」應採用相同廠牌以簡化管理。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["「個人電腦與伺服器防毒系統」與「防毒匣道系統」應採用相同廠牌以簡化管理。"]},{"question_number":510,"title":"網路防火牆的主要功能是什麼？","option":["其唯一功能是監測內部網路的流量，不涉及外部連線。","限制不必要的服務埠號開啟，僅允許必要的服務連線。","網路防火牆的功能僅限於阻擋已知的惡意軟體入侵。","主要用於加密網路通訊。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["限制不必要的服務埠號開啟，僅允許必要的服務連線。"]},{"question_number":511,"title":"關於網路防火牆的管理重點，以下哪項是確保其安全有效運作的關鍵？","option":["防火牆存取規則的變更無需管理程序。","防火牆存取紀錄無需即時匯出，定期備份即可。","定期產出異常存取統計分析報表，進行異常處理。","防火牆存取控管規則終身無需盤查。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["定期產出異常存取統計分析報表，進行異常處理。"]},{"question_number":512,"title":"電子郵件過濾機制的核心管理重點之一，是如何處理其規則的變更？","option":["規則變更由系統自動完成，無需人工介入。","規則變更應建立管理程序，包含變更申請、核准及記錄。","規則變更頻率越快越好，不需考量影響。","規則變更僅由技術人員私下進行。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["規則變更應建立管理程序，包含變更申請、核准及記錄。"]},{"question_number":513,"title":"在選購電子郵件過濾機制時，除了其判斷垃圾郵件的精準度外，建議機關還應考量哪些其他重要因素，以確保機制能全面符合業務需求？","option":["僅需關注是否提供基礎的郵件收發功能。","主要考量系統的硬體規格是否為最高級別。","應評估對於中文信件或多國語言的支援能力。","僅需確認系統的初始購買成本是否最低。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["應評估對於中文信件或多國語言的支援能力。"]},{"question_number":514,"title":"面對APT（進階持續性威脅）攻擊，除了加強防禦，還應具備哪種能力，以應對攻擊後的影響？","option":["只需要部署單一高階資安設備即可全面應對。","提升系統效能以加速攻擊。","透過備份管理等機制進行快速復原。","減少資安事件日誌紀錄。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["透過備份管理等機制進行快速復原。"]},{"question_number":515,"title":"為了有效防禦APT攻擊，透過哪種機制可提升安全防禦策略及戰略的部署？","option":["完全依賴內部資安團隊的分析，不參考外部資訊。","透過跨機關的資安聯防機制、情資的交換機制。","專注於修補已知漏洞，不需情資共享。","減少對外部威脅情資的關注。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["透過跨機關的資安聯防機制、情資的交換機制。"]},{"question_number":516,"title":"關於「政府組態基準(GCB)」的目的和部署範圍，以下敘述何者不正確","option":["GCB目的在於發展一致性安全組態設定。","GCB可提升政府機關資通訊設備之資安防護。","GCB部署範圍僅限於伺服器。","GCB的導入是A級與B級公務機關必須辦理的事項。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["GCB部署範圍僅限於伺服器。"]},{"question_number":517,"title":"在組態變更管理中，當IT系統的組態變更時，下列哪一項層面是應特別考量的？","option":["進行組態變更時，考量重點僅在於系統功能是否正常運行。","應考量可用性影響、安全組態影響及存取控制影響。","組態變更評估時，唯一需考慮的因素是變更所產生的成本。","變更後無需更新組態管理資料庫。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["應考量可用性影響、安全組態影響及存取控制影響。"]},{"question_number":518,"title":"依據資通安全責任等級規定，A級機關的滲透測試與弱點掃描頻率為何？","option":["每年1次滲透測試，每年1次弱點掃描。","每2年1次滲透測試，每年1次弱點掃描。","每年1次滲透測試，每年2次弱點掃描。","每2年1次滲透測試，每2年1次弱點掃描。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["每年1次滲透測試，每年2次弱點掃描。"]},{"question_number":519,"title":"關於弱點掃描與滲透測試的主要差異，以下敘述何者正確？","option":["弱點掃描是一種模擬攻擊，滲透測試是自動化檢測。","弱點掃描用於快速識別已知漏洞，滲透測試用於驗證防護措施有效性並找出可利用弱點。","弱點掃描主要針對內部網路，滲透測試主要針對外部網路。","弱點掃描不需要修補，滲透測試才需要。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["弱點掃描用於快速識別已知漏洞，滲透測試用於驗證防護措施有效性並找出可利用弱點。"]},{"question_number":520,"title":"在應用程式安全中，安全系統開發生命週期（SSDLC）的「部署與維運」階段應落實哪些重要工作？","option":["擬訂資安需求與測試計畫。","執行風險分析與評估。","定期修補漏洞、升級更新版本及即時監控。","進行源碼掃描安全檢測。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["定期修補漏洞、升級更新版本及即時監控。"]},{"question_number":521,"title":"為了確保變更不會成為新的風險來源，應用程式安全中的「變更控制」機制強調所有變更都需符合哪三個關鍵要素？","option":["簡單、快速、有效。","授權、測試、記錄。","自動、手動、半自動。","規劃、執行、評估。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["授權、測試、記錄。"]},{"question_number":522,"title":"資通安全健診的目的為何？","option":["資通安全健診的主要目的是處理已知的資安事件，不包括預防措施。","資通安全健診服務僅限於提供資通系統的漏洞掃描，不提供其他建議。","整合各資通安全項目的檢視服務作業，提供機關資通安全改善建議，並提升整體防護能力。","其目的只在於評估內部人員的資安意識，不涉及系統層面的檢視。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["整合各資通安全項目的檢視服務作業，提供機關資通安全改善建議，並提升整體防護能力。"]},{"question_number":523,"title":"在資通安全健診的「使用者端電腦惡意活動檢視」項目中，應檢視哪些內容？","option":["檢視內容局限於網路架構圖的安全性，不包含實際系統配置。","檢視惡意活動時，主要檢查伺服器主機的作業系統更新，不包括使用者端。","檢視作業系統及應用程式的安全性更新、是否使用停止支援的軟體、及防毒軟體狀態。","只需要架設封包側錄設備來觀察對外異常連線，其他方法不需使用。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["檢視作業系統及應用程式的安全性更新、是否使用停止支援的軟體、及防毒軟體狀態。"]},{"question_number":524,"title":"關於網路連線安全，為何應避免使用HTTP、FTP和TELNET等協議進行敏感資料傳輸？","option":["這些協議採用明文傳輸，通訊內容有可能被監聽，容易造成資訊洩露風險。","這些協議不支援大檔案傳輸。","這些協議傳輸速度較慢。","這些協議容易受到分散式阻斷服務（DDoS）攻擊。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["這些協議採用明文傳輸，通訊內容有可能被監聽，容易造成資訊洩露風險。"]},{"question_number":525,"title":"雲端運算具備多項核心特性，以下何者敘述是關於「受量測服務(MeasuredService)」的特性？","option":["雲端資源可以被快速且彈性地擴展或縮減。","多個客戶共享同一套基礎設施和應用程式。","供應商會對資源的使用情況進行監控、測量和報告，通常按照實際消耗量計費。","雲端服務可以透過標準的網路機制廣泛被存取。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["供應商會對資源的使用情況進行監控、測量和報告，通常按照實際消耗量計費。"]},{"question_number":526,"title":"在雲端安全管理中，ISO/IEC27017:2015標準強調了哪些關鍵考量，尤其是關於供應商與客戶的責任界線？","option":["雲端安全管理只關注虛擬機器的強化，不涉及其他層面。","雲端環境下的角色共享與權責，以及雲端服務客戶資產的移除。","需確保虛擬和實體網路安全管理的一致性。","雲端安全管理只針對管理者的操作安全進行考量，不包括客戶端的責任。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["雲端環境下的角色共享與權責，以及雲端服務客戶資產的移除。"]},{"question_number":527,"title":"實體安全的三個核心防禦策略為嚇阻、延遲、偵測與處理。以下何者是屬於「嚇阻」的措施？","option":["感應式讀卡機。","設置多層門禁。","公布違反實體控管要求人員姓名。","紅外線進出感應。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["公布違反實體控管要求人員姓名。"]},{"question_number":528,"title":"依據《資通安全管理法》第9條，機關委外辦理資通系統或服務時，應考量哪些因素來選任適當受託者並監督其維護情形？","option":["唯一的考量因素是服務的價格高低。","選擇廠商時，只需考量其過往經驗，其他能力不重要。","考量受託者之專業能力與經驗、委外項目之性質及資通安全需求。","無需監督，全權交由廠商負責。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["考量受託者之專業能力與經驗、委外項目之性質及資通安全需求。"]},{"question_number":529,"title":"依據《資通安全管理法施行細則》第4條第1項，機關在選任及監督委外廠商時，哪些事項是需要注意的？","option":["評估廠商時，僅需確認其是否具備ISO9001品質認證。","廠商只需提供過去的合作經驗，其他資安相關資料不需評估。","評估廠商的資安管理能力、確認資安專業人員、以及委託終止後的資料處理方式。","無需關注涉及國家機密的委託業務。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["評估廠商的資安管理能力、確認資安專業人員、以及委託終止後的資料處理方式。"]},{"question_number":530,"title":"資訊委外主要分為四大類別，以下何者是屬於「顧問訓練類」的服務形態？","option":["ISMS顧問輔導。","機房設施管理。","系統開發。","軟體即服務(SaaS)。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["ISMS顧問輔導。"]},{"question_number":531,"title":"為降低遠端維護的資安風險，機關應採取的原則與防護措施為何？","option":["原則允許、例外禁止。","原則禁止、例外允許，並應強化多因子鑑別。","無需額外防護措施。","遠端維護連線應該只在短天期內開放，不考慮其他條件。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["原則禁止、例外允許，並應強化多因子鑑別。"]},{"question_number":532,"title":"資訊委外生命週期的「計畫階段」包含哪些關鍵步驟？","option":["決標與簽約。","完成建置與確認營運。","決定需求與識別可行解決方案。","驗收與保固。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["決定需求與識別可行解決方案。"]},{"question_number":533,"title":"在委外資安需求識別時，為何需要「識別委外廠商之限制」？","option":["識別限制只是為了增加招標流程的複雜性。","識別限制的目的完全在於確保廠商具備足夠的技術能力。","依據委外業務的敏感性和法規要求，對潛在廠商設定資格限制，特別是涉及國家機密或國家安全。","識別限制的唯一目的是篩選出價格最低的廠商。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["依據委外業務的敏感性和法規要求，對潛在廠商設定資格限制，特別是涉及國家機密或國家安全。"]},{"question_number":534,"title":"在資訊委外生命週期的「招標階段」，資安管理重點著重在哪個方面？","option":["招標階段的資安管理重心完全放在廠商的價格競爭。","資安管理重點主要在於合約條款的法律審查，不涉及技術層面。","RFP撰寫之完整度與評選準則中之資安要求符合度。","招標階段資安管理只針對最終解決方案進行選擇，不考慮前期要求。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["RFP撰寫之完整度與評選準則中之資安要求符合度。"]},{"question_number":535,"title":"在資訊委外「履約管理階段」中，機關應如何管理資訊委外的使用者存取？","option":["在專案初期授予委外人員最高權限，後續無需調整。","委外人員權限由廠商自行管理，機關無需介入。","機關只需透過電話確認委外人員的權限即可。","建立正式程序，從開始登記使用註冊，到最終不再需要存取資通系統與服務註銷。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["建立正式程序，從開始登記使用註冊，到最終不再需要存取資通系統與服務註銷。"]},{"question_number":536,"title":"在資訊委外「驗收階段」，若資通系統使用非委外廠商自行開發的第三方元件，機關應要求廠商揭露哪些資訊？","option":["揭露第三方程式元件之來源與授權證明，以確保其元件非來自大陸地區或其他限制地區。","廠商只需要揭露元件的功能說明，不需提供其他證明。","廠商只需要揭露元件的版本號，其他資訊不重要。","無需揭露，直接使用即可。"],"signal":true,"answer":[],"signalAnswer":"","rightAnswer":["揭露第三方程式元件之來源與授權證明，以確保其元件非來自大陸地區或其他限制地區。"]},{"question_number":537,"title":"資訊委外專案「結束後」，機關應立即採取哪些資安措施？","option":["專案結束後，機關的主要任務是進行最終付款，其他資安措施可延後。","專案結束後，機關只需回收紙本文件，無需處理電子資料或存取權限。","立即停止委外廠商之實體與邏輯存取權限，並回收或銷毀屬於機關之資
