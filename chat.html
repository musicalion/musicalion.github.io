<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID // 匿名聊天室</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root {
    --bg:#080b0f; --panel:#0d1117; --border:#1e2d3d;
    --accent:#00e5ff; --accent2:#ff3cac; --text:#c9d1d9;
    --text-dim:#4a5568; --msg-self:#0a1628; --msg-other:#111a24; --online:#39d353;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;position:relative}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
  .logo{font-family:'Share Tech Mono',monospace;font-size:1.3rem;letter-spacing:.15em;color:var(--accent);text-shadow:0 0 20px var(--accent)}
  .logo span{color:var(--accent2)}
  .status-bar{display:flex;align-items:center;gap:20px;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-dim)}
  .online-indicator{display:flex;align-items:center;gap:6px;color:var(--online)}
  .online-dot{width:7px;height:7px;border-radius:50%;background:var(--online);box-shadow:0 0 8px var(--online);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .conn-badge{font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:3px 8px;border-radius:4px;border:1px solid}
  .conn-badge.ok{color:var(--online);border-color:var(--online)}
  .conn-badge.err{color:var(--accent2);border-color:var(--accent2)}
  .conn-badge.wait{color:var(--text-dim);border-color:var(--text-dim)}
  .chat-wrapper{display:flex;flex:1;overflow:hidden}
  .sidebar{width:220px;border-right:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;padding:16px;gap:12px;flex-shrink:0}
  .sidebar-title{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .room-list{display:flex;flex-direction:column;gap:4px}
  .room-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:8px;transition:all .2s;border:1px solid transparent}
  .room-item:hover{background:rgba(0,229,255,.05);border-color:var(--border)}
  .room-item.active{background:rgba(0,229,255,.1);border-color:var(--accent);color:var(--accent)}
  .room-item.active .room-hash{color:var(--accent)}
  .room-hash{color:var(--text-dim);font-family:'Share Tech Mono',monospace}
  .my-identity{margin-top:auto;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--bg)}
  .identity-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-dim);letter-spacing:.15em;margin-bottom:6px}
  .identity-name{font-size:.85rem;color:var(--accent2);font-weight:500}
  .chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
  .chat-header-title{font-family:'Share Tech Mono',monospace;font-size:.95rem;color:var(--accent)}
  .chat-header-desc{font-size:.75rem;color:var(--text-dim);margin-left:auto}
  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .msg-group{display:flex;flex-direction:column;gap:2px;margin-bottom:12px;animation:msgIn .25s ease-out}
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg-group.self{align-items:flex-end}
  .msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:0 4px}
  .msg-group.self .msg-meta{flex-direction:row-reverse}
  .msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:.7rem;font-weight:bold;flex-shrink:0}
  .msg-sender{font-family:'Share Tech Mono',monospace;font-size:.72rem}
  .msg-time{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text-dim)}
  .msg-bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:.88rem;line-height:1.55;word-break:break-word}
  .msg-group:not(.self) .msg-bubble{background:var(--msg-other);border:1px solid var(--border);border-top-left-radius:4px}
  .msg-group.self .msg-bubble{background:var(--msg-self);border:1px solid rgba(0,229,255,.2);border-top-right-radius:4px;color:#e2e8f0}
  .sys-msg{text-align:center;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-dim);margin:8px 0;display:flex;align-items:center;gap:10px}
  .sys-msg::before,.sys-msg::after{content:'';flex:1;height:1px;background:var(--border)}
  .input-area{padding:16px 20px;border-top:1px solid var(--border);background:var(--panel);display:flex;gap:12px;align-items:flex-end;flex-shrink:0}
  .input-wrapper{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;display:flex;align-items:flex-end;transition:border-color .2s,box-shadow .2s;overflow:hidden}
  .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.08)}
  #msgInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:.9rem;padding:12px 16px;resize:none;max-height:120px;line-height:1.5}
  #msgInput::placeholder{color:var(--text-dim)}
  .send-btn{margin:8px;width:36px;height:36px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .send-btn:hover{background:#33eeff;box-shadow:0 0 16px rgba(0,229,255,.5)}
  .send-btn:active{transform:scale(.93)}
  .send-btn svg{color:#080b0f}
  .send-btn:disabled{opacity:.4;cursor:not-allowed}
  .extra-btn{width:36px;height:36px;background:transparent;border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:1.1rem;transition:all .2s;flex-shrink:0}
  .extra-btn:hover{border-color:var(--accent);color:var(--accent)}
  .typing-indicator{padding:0 20px 8px;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--text-dim);height:20px;flex-shrink:0}
  .typing-dots span{display:inline-block;width:4px;height:4px;background:var(--text-dim);border-radius:50%;margin:0 1px;animation:dotBounce 1.2s infinite}
  .typing-dots span:nth-child(2){animation-delay:.2s}
  .typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes dotBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
  @media(max-width:600px){.sidebar{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">VOID<span> //</span> 匿名聊天</div>
  <div class="status-bar">
    <div class="online-indicator"><div class="online-dot"></div><span id="onlineCount">0 在線</span></div>
    <span id="connBadge" class="conn-badge wait">連線中...</span>
    <span id="clockDisplay"></span>
  </div>
</header>

<div class="chat-wrapper">
  <div class="sidebar">
    <div class="sidebar-title">頻道</div>
    <div class="room-list">
      <div class="room-item active" onclick="switchRoom(this,'general','隨便聊聊')"><span class="room-hash">#</span>隨便聊聊</div>
      <div class="room-item" onclick="switchRoom(this,'tech','科技話題')"><span class="room-hash">#</span>科技話題</div>
      <div class="room-item" onclick="switchRoom(this,'music','音樂分享')"><span class="room-hash">#</span>音樂分享</div>
      <div class="room-item" onclick="switchRoom(this,'midnight','深夜廢話')"><span class="room-hash">#</span>深夜廢話</div>
    </div>
    <div class="my-identity">
      <div class="identity-label">你的身份</div>
      <div class="identity-name" id="myNameDisplay"></div>
    </div>
  </div>

  <div class="chat-main">
    <div class="chat-header">
      <span class="room-hash" style="color:var(--text-dim);font-family:'Share Tech Mono',monospace">#</span>
      <span class="chat-header-title" id="currentRoomTitle">隨便聊聊</span>
      <span class="chat-header-desc">所有訊息皆匿名・不留紀錄</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <button class="extra-btn" onclick="insertEmoji()">😊</button>
      <div class="input-wrapper">
        <textarea id="msgInput" placeholder="連線中，請稍候..." rows="1" disabled></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- MQTT.js via CDN -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
// ── 常數 ──────────────────────────────────────────────────────
const BROKER    = 'wss://broker.emqx.io:8084/mqtt';
const TOPIC_PREFIX = 'void-chat-room/v1/'; // 改這個就能建立自己私密的聊天室
const PREFIXES  = ['幽靈','影子','漩渦','迷霧','流星','暗流','碎片','虛空','微塵','殘影','暗碼','迴響'];
const AVATARS   = [
  {color:'#00e5ff',bg:'#002a33'},{color:'#ff3cac',bg:'#330018'},
  {color:'#39d353',bg:'#0a2b10'},{color:'#ffd700',bg:'#2b2000'},
  {color:'#a78bfa',bg:'#1a0a33'},{color:'#fb923c',bg:'#301500'},
];
const EMOJIS = ['🌙','✨','🔥','💫','🌀','⚡','🎲','🌊','🎯','🤖'];

// ── 身份 ──────────────────────────────────────────────────────
let myName = localStorage.getItem('void_name');
let myAvi  = parseInt(localStorage.getItem('void_avatar') ?? '-1');
if (!myName || myAvi < 0) {
  myName = PREFIXES[Math.floor(Math.random()*PREFIXES.length)] + '_' + (Math.floor(Math.random()*9000)+1000);
  myAvi  = Math.floor(Math.random()*AVATARS.length);
  localStorage.setItem('void_name', myName);
  localStorage.setItem('void_avatar', myAvi);
}
const myAvatar = AVATARS[myAvi];
document.getElementById('myNameDisplay').textContent = myName;

// 用名字雜湊決定顏色
const colorCache = {};
function avatarFor(name) {
  if (name === myName) return myAvatar;
  if (!colorCache[name]) {
    let h = 0;
    for (const c of name) h = (h*31 + c.charCodeAt(0)) & 0xffff;
    colorCache[name] = AVATARS[h % AVATARS.length];
  }
  return colorCache[name];
}

// ── 時鐘 ──────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
setInterval(() => {
  const d = new Date();
  document.getElementById('clockDisplay').textContent =
    `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}, 1000);

// ── 在線人數追蹤 ──────────────────────────────────────────────
const onlineUsers = new Set();
function updateOnlineCount() {
  document.getElementById('onlineCount').textContent = `${onlineUsers.size} 在線`;
}

// ── 打字狀態 ──────────────────────────────────────────────────
const typingUsers = {};
let myTypingTimeout = null;

function updateTyping() {
  const others = Object.keys(typingUsers).filter(n => n !== myName);
  const el = document.getElementById('typingIndicator');
  el.innerHTML = others.length
    ? `${others[0]} 正在輸入 <span class="typing-dots"><span></span><span></span><span></span></span>`
    : '';
}

// ── 渲染訊息 ──────────────────────────────────────────────────
function appendMessage({sender, text, timestamp}) {
  const isSelf = sender === myName;
  const av = avatarFor(sender);
  const msgs = document.getElementById('messages');
  const atBot = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 80;

  const group = document.createElement('div');
  group.className = 'msg-group' + (isSelf ? ' self' : '');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const avel = document.createElement('div');
  avel.className = 'msg-avatar';
  avel.style.cssText = `background:${av.bg};color:${av.color};border:1px solid ${av.color}44`;
  avel.textContent = sender.slice(0,2).toUpperCase();

  const sel = document.createElement('span');
  sel.className = 'msg-sender';
  sel.style.color = av.color;
  sel.textContent = isSelf ? `${sender}（你）` : sender;

  const tel = document.createElement('span');
  tel.className = 'msg-time';
  const d = new Date(timestamp);
  tel.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}`;

  meta.append(avel, sel, tel);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  group.append(meta, bubble);
  msgs.appendChild(group);
  if (atBot || isSelf) msgs.scrollTop = msgs.scrollHeight;
}

function appendSystem(text) {
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── MQTT ──────────────────────────────────────────────────────
let currentRoom = 'general';
let client = null;

function topic(room, type) {
  return `${TOPIC_PREFIX}${room}/${type}`;
}

function publish(type, payload) {
  if (!client || !client.connected) return;
  client.publish(topic(currentRoom, type), JSON.stringify(payload), {qos: 0, retain: false});
}

function connect() {
  const clientId = 'void_' + Math.random().toString(36).slice(2, 10);

  client = mqtt.connect(BROKER, {
    clientId,
    clean: true,
    connectTimeout: 10000,
    reconnectPeriod: 3000,
  });

  client.on('connect', () => {
    console.log('[VOID] 連線成功');
    document.getElementById('connBadge').className = 'conn-badge ok';
    document.getElementById('connBadge').textContent = '已連線';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('msgInput').placeholder = '輸入訊息…（Enter 送出）';
    document.getElementById('sendBtn').disabled = false;

    subscribeRoom(currentRoom);
    appendSystem('已連線・身份已匿名化');

    // 廣播上線
    publish('presence', {sender: myName, online: true});
    onlineUsers.add(myName);
    updateOnlineCount();
  });

  client.on('reconnect', () => {
    document.getElementById('connBadge').className = 'conn-badge wait';
    document.getElementById('connBadge').textContent = '重新連線中...';
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  });

  client.on('error', (err) => {
    console.error('[VOID] 錯誤:', err);
    document.getElementById('connBadge').className = 'conn-badge err';
    document.getElementById('connBadge').textContent = '連線錯誤';
  });

  client.on('offline', () => {
    document.getElementById('connBadge').className = 'conn-badge err';
    document.getElementById('connBadge').textContent = '已離線';
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    onlineUsers.clear();
    onlineUsers.add(myName);
    updateOnlineCount();
  });

  client.on('message', (t, payload) => {
    try {
      const data = JSON.parse(payload.toString());
      const parts = t.split('/');
      const type  = parts[parts.length - 1];

      if (type === 'msg') {
        appendMessage(data);
      } else if (type === 'presence') {
        if (data.online) {
          onlineUsers.add(data.sender);
          // 回應自己在線（讓新加入者知道我們存在）
          if (data.sender !== myName) {
            setTimeout(() => publish('presence', {sender: myName, online: true}), 300);
          }
        } else {
          onlineUsers.delete(data.sender);
        }
        updateOnlineCount();
      } else if (type === 'typing') {
        if (data.sender !== myName) {
          if (data.typing) {
            typingUsers[data.sender] = setTimeout(() => {
              delete typingUsers[data.sender];
              updateTyping();
            }, 4000);
          } else {
            clearTimeout(typingUsers[data.sender]);
            delete typingUsers[data.sender];
          }
          updateTyping();
        }
      }
    } catch(e) { /* 忽略壞掉的訊息 */ }
  });
}

function subscribeRoom(room) {
  if (!client) return;
  // 訂閱這個房間的所有 topic
  client.subscribe([
    topic(room, 'msg'),
    topic(room, 'presence'),
    topic(room, 'typing'),
  ], {qos: 0});
}

function unsubscribeRoom(room) {
  if (!client) return;
  client.unsubscribe([
    topic(room, 'msg'),
    topic(room, 'presence'),
    topic(room, 'typing'),
  ]);
}

// ── 切換房間 ──────────────────────────────────────────────────
window.switchRoom = function(el, room, label) {
  if (room === currentRoom) return;
  publish('presence', {sender: myName, online: false});
  unsubscribeRoom(currentRoom);

  currentRoom = room;
  document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('currentRoomTitle').textContent = label;
  document.getElementById('messages').innerHTML = '';
  onlineUsers.clear();

  subscribeRoom(room);
  appendSystem(`已切換到 #${label}`);
  publish('presence', {sender: myName, online: true});
  onlineUsers.add(myName);
  updateOnlineCount();
};

// ── 發送訊息 ──────────────────────────────────────────────────
window.sendMessage = function() {
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !client?.connected) return;

  const msg = {sender: myName, text, timestamp: Date.now()};
  publish('msg', msg);
  appendMessage(msg); // 自己的訊息直接顯示（不等 echo）

  publish('typing', {sender: myName, typing: false});
  inp.value = '';
  inp.style.height = 'auto';
};

// ── 輸入框 ────────────────────────────────────────────────────
const inp = document.getElementById('msgInput');
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  publish('typing', {sender: myName, typing: inp.value.length > 0});
  clearTimeout(myTypingTimeout);
  myTypingTimeout = setTimeout(() => publish('typing', {sender: myName, typing: false}), 3000);
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
});

window.insertEmoji = function() {
  inp.value += EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  inp.focus();
};

// ── 離線時廣播 ────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  if (client?.connected) {
    publish('presence', {sender: myName, online: false});
  }
});

// ── 啟動 ──────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
