<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球池抽獎</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a14;
    --panel: #0c1525;
    --border: rgba(0,200,255,0.15);
    --cyan: #00e5ff;
    --gold: #ffd700;
    --purple: #bf00ff;
    --green: #00ff88;
    --text: #c8e0ff;
    --dim: #4a6080;
    --glow-cyan: 0 0 20px rgba(0,229,255,0.5);
    --glow-gold: 0 0 20px rgba(255,215,0,0.6);
    --glow-purple: 0 0 20px rgba(191,0,255,0.6);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
    overflow-x: hidden;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.2), transparent),
      radial-gradient(2px 2px at 90% 50%, rgba(0,229,255,0.3), transparent),
      radial-gradient(2px 2px at 30% 20%, rgba(0,229,255,0.2), transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* Top grid line decoration */
  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 180px;
    background:
      linear-gradient(to top, rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(to right, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: linear-gradient(to top, black, transparent);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 6px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(22px, 5vw, 34px);
    letter-spacing: 0.12em;
    color: var(--cyan);
    text-shadow: var(--glow-cyan), 0 0 60px rgba(0,229,255,0.2);
  }

  .logo span {
    color: var(--gold);
    text-shadow: var(--glow-gold);
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Game type selector tabs */
  .game-tabs {
    display: flex;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
  }

  .tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--dim);
    background: transparent;
    transition: all 0.25s;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    background: rgba(0,229,255,0.12);
    color: var(--cyan);
    box-shadow: inset 0 0 0 1px rgba(0,229,255,0.3);
  }

  /* Main pool area */
  .pools-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
  }

  .pool-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .pool-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  #pool {
    width: 520px;
    height: 280px;
    background: var(--panel);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.05),
      0 0 60px rgba(0,229,255,0.08),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* Scanlines overlay */
  #pool::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 5;
    border-radius: 20px;
  }

  #small-pool {
    width: 120px;
    height: 280px;
    background: var(--panel);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(191,0,255,0.2);
    box-shadow: 0 0 40px rgba(191,0,255,0.08);
  }

  /* Balls */
  .ball {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    cursor: default;
    user-select: none;
    transition: box-shadow 0.4s, transform 0.5s;
    will-change: left, top;
    /* glossy sphere */
    background: radial-gradient(circle at 35% 30%, #fff8 0%, #ffca00 45%, #b8860b 100%);
    color: #3a2800;
    box-shadow:
      inset -3px -3px 6px rgba(0,0,0,0.3),
      inset 3px 3px 6px rgba(255,255,255,0.2),
      0 2px 6px rgba(0,0,0,0.5);
  }

  .ball.selected {
    background: radial-gradient(circle at 35% 30%, #fff 0%, #00e5ff 50%, #006080 100%);
    color: #001820;
    box-shadow:
      0 0 0 2px var(--cyan),
      0 0 20px var(--cyan),
      0 0 50px rgba(0,229,255,0.5),
      inset -3px -3px 6px rgba(0,0,0,0.2),
      inset 3px 3px 6px rgba(255,255,255,0.3);
    transform: scale(1.3);
    z-index: 10;
  }

  .ball.special-ball {
    background: radial-gradient(circle at 35% 30%, #fff 0%, #bf00ff 50%, #4a006a 100%);
    color: #fff;
    box-shadow:
      0 0 0 2px var(--purple),
      0 0 20px var(--purple),
      0 0 50px rgba(191,0,255,0.6),
      inset -3px -3px 6px rgba(0,0,0,0.2),
      inset 3px 3px 6px rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* UFO (pure CSS) */
  .ufo {
    position: absolute;
    width: 56px;
    height: 32px;
    z-index: 20;
    transform: translate(-50%, -50%);
  }

  .ufo-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 18px;
    background: linear-gradient(180deg, #4af, #07c);
    border-radius: 50%;
    box-shadow: 0 0 10px #4af, 0 0 20px rgba(68,170,255,0.4);
  }

  .ufo-dome {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 16px;
    background: linear-gradient(160deg, rgba(255,255,255,0.8) 0%, rgba(0,200,255,0.4) 100%);
    border-radius: 50% 50% 0 0;
    border: 1px solid rgba(255,255,255,0.5);
  }

  .ufo-beam {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 20px;
    background: linear-gradient(180deg, rgba(68,170,255,0.5), transparent);
    clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
    animation: beamPulse 1s ease-in-out infinite;
  }

  @keyframes beamPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* Alien (pure CSS emoji replacement) */
  .alien-icon {
    position: absolute;
    width: 44px;
    height: 44px;
    z-index: 30;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.34,1.56,0.64,1), opacity 0.5s;
    font-size: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Result panel */
  #result-panel {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 24px;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .result-balls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    min-height: 40px;
  }

  .result-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    background: radial-gradient(circle at 35% 30%, #fff8 0%, #ffca00 45%, #b8860b 100%);
    color: #3a2800;
    box-shadow: var(--glow-gold), inset -2px -2px 4px rgba(0,0,0,0.3);
    opacity: 0;
    transform: scale(0) rotate(-180deg);
    transition: opacity 0.4s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  .result-num.show {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  .result-num.special {
    background: radial-gradient(circle at 35% 30%, #fff 0%, #bf00ff 50%, #4a006a 100%);
    color: #fff;
    box-shadow: var(--glow-purple), inset -2px -2px 4px rgba(0,0,0,0.2);
  }

  .second-result-num {
    background: radial-gradient(circle at 35% 30%, #fff 0%, #bf00ff 50%, #4a006a 100%);
    color: #fff;
    box-shadow: var(--glow-purple), inset -2px -2px 4px rgba(0,0,0,0.2);
  }

  .divider {
    width: 2px;
    height: 36px;
    background: linear-gradient(180deg, transparent, var(--dim), transparent);
    border-radius: 2px;
    align-self: center;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }

  .btn:hover::after { left: 160%; }

  .btn-primary {
    background: linear-gradient(135deg, #007acc, #00b4ff);
    color: #fff;
    box-shadow: 0 0 20px rgba(0,180,255,0.4), 0 4px 12px rgba(0,0,0,0.3);
  }

  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 0 30px rgba(0,180,255,0.7), 0 4px 16px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.05);
    color: var(--dim);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover:not(:disabled) {
    color: var(--text);
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.06);
  }

  .btn-purple {
    background: linear-gradient(135deg, #6600aa, #bf00ff);
    color: #fff;
    box-shadow: 0 0 20px rgba(191,0,255,0.3), 0 4px 12px rgba(0,0,0,0.3);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* Settings */
  .settings-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 38px;
    height: 38px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    z-index: 100;
    transition: all 0.2s;
    color: var(--dim);
  }

  .settings-btn:hover {
    border-color: rgba(0,229,255,0.4);
    color: var(--cyan);
  }

  .settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    backdrop-filter: blur(4px);
  }

  .settings-overlay.open { display: flex; align-items: center; justify-content: center; }

  .settings-modal {
    background: #0e1a2e;
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 20px;
    padding: 28px 32px;
    width: 340px;
    box-shadow: 0 0 60px rgba(0,229,255,0.1), 0 20px 60px rgba(0,0,0,0.7);
  }

  .settings-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 0.15em;
    color: var(--cyan);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .close-btn {
    cursor: pointer;
    color: var(--dim);
    font-size: 20px;
    line-height: 1;
    transition: color 0.2s;
  }

  .close-btn:hover { color: var(--text); }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .field input[type="number"],
  .field select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: rgba(0,229,255,0.4);
  }

  .field input:disabled, .field select:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
  }

  .checkbox-row input[type="checkbox"] {
    accent-color: var(--cyan);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .checkbox-row.disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    color: #ff5566;
    font-size: 12px;
    margin-top: 10px;
    min-height: 18px;
  }

  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* Status indicator */
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    display: inline-block;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Confetti-like burst when drawing */
  @keyframes appear {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* Responsive */
  @media (max-width: 600px) {
    #pool { width: 92vw; height: 220px; }
    #small-pool { height: 220px; }
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(191,0,255,0.3), 0 4px 12px rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 40px rgba(191,0,255,0.8), 0 4px 16px rgba(0,0,0,0.3); }
  }
  .btn.pulse { animation: pulse-glow 1s ease-in-out infinite; }

  /* ─── 版型：外星人（預設）─────────────────────────── */
  body.theme-alien {
    --bg: #050a14;
    --panel: #0c1525;
    --border: rgba(0,200,255,0.15);
    --cyan: #00e5ff;
    --gold: #ffd700;
    --purple: #bf00ff;
    --green: #00ff88;
    --text: #c8e0ff;
    --dim: #4a6080;
    --accent: #00e5ff;
    --accent2: #ffd700;
    --ball-bg: radial-gradient(circle at 35% 30%, #fff8 0%, #ffca00 45%, #b8860b 100%);
    --ball-color: #3a2800;
    --pool-shadow: 0 0 60px rgba(0,229,255,0.08);
    --pool-border: rgba(0,200,255,0.15);
    --tab-active-bg: rgba(0,229,255,0.12);
    --tab-active-color: #00e5ff;
    --tab-active-shadow: inset 0 0 0 1px rgba(0,229,255,0.3);
    --btn-primary: linear-gradient(135deg,#007acc,#00b4ff);
    --logo-color: #00e5ff;
    --logo-span: #ffd700;
    --grid-color: rgba(0,229,255,0.04);
    --scanline: rgba(0,0,0,0.08);
  }

  /* ─── 版型：貓貓財神 ─────────────────────────────── */
  body.theme-cat {
    --bg: #1a0a00;
    --panel: #2a1200;
    --border: rgba(255,180,0,0.25);
    --cyan: #ff9d00;
    --gold: #ffe066;
    --purple: #ff5500;
    --green: #ffcc00;
    --text: #ffe8b0;
    --dim: #8a6030;
    --accent: #ff9d00;
    --accent2: #ffe066;
    --ball-bg: radial-gradient(circle at 35% 30%, #fff8 0%, #ff4500 50%, #8b1a00 100%);
    --ball-color: #fff;
    --pool-shadow: 0 0 60px rgba(255,150,0,0.12);
    --pool-border: rgba(255,180,0,0.25);
    --tab-active-bg: rgba(255,157,0,0.15);
    --tab-active-color: #ff9d00;
    --tab-active-shadow: inset 0 0 0 1px rgba(255,157,0,0.4);
    --btn-primary: linear-gradient(135deg,#cc5500,#ff9d00);
    --logo-color: #ff9d00;
    --logo-span: #ffe066;
    --grid-color: rgba(255,157,0,0.04);
    --scanline: rgba(0,0,0,0.06);
  }

  body.theme-cat::before {
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,220,100,0.5), transparent),
      radial-gradient(1px 1px at 80% 10%, rgba(255,200,80,0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,180,60,0.3), transparent),
      radial-gradient(1px 1px at 40% 85%, rgba(255,220,100,0.4), transparent),
      radial-gradient(1px 1px at 10% 60%, rgba(255,200,80,0.3), transparent),
      radial-gradient(3px 3px at 90% 50%, rgba(255,157,0,0.4), transparent),
      radial-gradient(2px 2px at 30% 20%, rgba(255,200,0,0.3), transparent);
  }

  body.theme-cat::after {
    background:
      linear-gradient(to top, var(--grid-color) 1px, transparent 1px),
      linear-gradient(to right, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* 共用：使用 CSS 變數讓元件自動跟隨版型 */
  body.theme-alien #pool,
  body.theme-cat #pool {
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), var(--pool-shadow), inset 0 1px 0 rgba(255,255,255,0.04);
    border-color: var(--pool-border);
    background: var(--panel);
  }

  body.theme-cat #pool::after {
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      var(--scanline) 3px, var(--scanline) 4px
    );
  }

  body.theme-cat #small-pool {
    border-color: rgba(255,100,0,0.3);
    box-shadow: 0 0 40px rgba(255,100,0,0.1);
    background: var(--panel);
  }

  body.theme-cat .logo { color: var(--logo-color); text-shadow: 0 0 20px rgba(255,157,0,0.6), 0 0 60px rgba(255,157,0,0.2); }
  body.theme-cat .logo span { color: var(--logo-span); text-shadow: 0 0 20px rgba(255,220,0,0.7); }
  body.theme-cat .subtitle { color: var(--dim); }

  body.theme-cat .game-tabs { background: var(--panel); border-color: var(--border); }
  body.theme-cat .tab { color: var(--dim); }
  body.theme-cat .tab:hover { color: var(--text); }
  body.theme-cat .tab.active { background: var(--tab-active-bg); color: var(--tab-active-color); box-shadow: var(--tab-active-shadow); }

  body.theme-cat .ball {
    background: var(--ball-bg);
    color: var(--ball-color);
  }
  body.theme-cat .ball.selected {
    background: radial-gradient(circle at 35% 30%, #fff 0%, #ff9d00 50%, #7a3000 100%);
    color: #fff;

<script>
// ─── Audio Engine (Web Audio API，無需外部檔案) ──────────────
let audioCtx = null;
let isMuted = false;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function toggleMute() {
  isMuted = !isMuted;
  document.getElementById("muteBtn").innerText = isMuted ? "🔇" : "🔊";
}

function playTone({ freq = 440, type = 'sine', vol = 0.3, attack = 0.01, decay = 0.1, sustain = 0.0, release = 0.2, duration = 0.3 } = {}) {
  if (isMuted) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  // ADSR
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
  gain.gain.linearRampToValueAtTime(sustain, ctx.currentTime + attack + decay);
  gain.gain.setValueAtTime(sustain, ctx.currentTime + duration - release);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function playNoise({ vol = 0.15, duration = 0.08, freq = 800 } = {}) {
  if (isMuted) return;
  const ctx = getAudioCtx();
  const bufSize = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = freq;
  filter.Q.value = 1.5;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
  src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + duration);
}

// 各場景音效
function sfxDrawStart() {
  if (isMuted) return;
  if (currentTheme === 'cat') {
    playCatMeow(0.65, 1.0);
    setTimeout(() => sfxBell(1800, 0.11), 250);
    return;
  }
  // UFO 引擎啟動：低頻嗡鳴漸起
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(60, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.5);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.3);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
  osc.start(); osc.stop(ctx.currentTime + 0.8);
}

function sfxUfoSpin() {
  // UFO 繞圈：連續低頻脈衝
  playTone({ freq: 80, type: 'sawtooth', vol: 0.08, attack: 0.02, decay: 0.15, release: 0.1, duration: 0.25 });
}

function sfxBallFly(index) {
  if (currentTheme === 'cat') {
    // 球被貓拍出：啪聲 + 輕喵
    sfxPat();
    if (index === 0) setTimeout(() => playCatMeow(0.5, 1.1), 80);
    return;
  }
  // 外星人：音階遞升的清脆音
  const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
  const freq = notes[index % notes.length];
  playTone({ freq, type: 'triangle', vol: 0.25, attack: 0.005, decay: 0.08, sustain: 0.05, release: 0.15, duration: 0.3 });
  playNoise({ vol: 0.06, duration: 0.05, freq: freq * 1.5 });
}

function sfxBallLand() {
  // 球落地：短促「叩」聲
  playTone({ freq: 220, type: 'sine', vol: 0.2, attack: 0.003, decay: 0.05, release: 0.1, duration: 0.18 });
  playNoise({ vol: 0.1, duration: 0.04, freq: 300 });
}

function sfxScan() {
  // 掃描閃爍：短促電子音
  playTone({ freq: 600 + Math.random() * 400, type: 'square', vol: 0.06, attack: 0.002, decay: 0.04, release: 0.02, duration: 0.07 });
}

function sfxSpecialBall() {
  if (currentTheme === 'cat') { playCatMeow(0.7, 1.2); [120,260,400].forEach((t,i)=>setTimeout(()=>sfxBell(1800+i*200,0.13),t)); return; }
  // 特別號：神秘上升音階
  const ctx = getAudioCtx();
  [0, 0.12, 0.24, 0.36].forEach((t, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    const freqs = [440, 554, 659, 880];
    osc.frequency.setValueAtTime(freqs[i], ctx.currentTime + t);
    gain.gain.setValueAtTime(0, ctx.currentTime + t);
    gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + t + 0.04);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + t + 0.18);
    osc.start(ctx.currentTime + t);
    osc.stop(ctx.currentTime + t + 0.2);
  });
}

function sfxFanfare() {

// 短促「喵」一聲（pitch 控制音高倍率）

// ─── 真實貓叫聲（Audio elements）───────────────────────────
// 使用 Pixabay royalty-free 貓叫聲
const catSounds = (() => {
  const urls = [
    'https://cdn.pixabay.com/audio/2022/03/10/audio_1e4a33ea52.mp3', // meow 1
    'https://cdn.pixabay.com/audio/2021/08/09/audio_8da72f00c5.mp3', // meow 2

  });
})();
let meowIdx = 0;

function playCatMeow(vol = 0.7, rate = 1.0) {
  if (isMuted) return;
  try {
    const snd = catSounds[meowIdx % catSounds.length].cloneNode();
    snd.volume = Math.min(1, vol);
    snd.playbackRate = rate;
    snd.play().catch(() => {});
    meowIdx++;
  } catch(e) {}
}

function sfxMeow(vol = 0.22, pitch = 1.0) {
  if (isMuted) return;
  const ctx = getAudioCtx(); const now = ctx.currentTime;
  // 主振盪：模擬貓叫的音高滑動曲線
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  // 泛音層讓音色更豐富
  const osc2 = ctx.createOscillator();
  const gain2 = ctx.createGain();
  [osc, osc2].forEach(o => o.type = 'triangle');
  osc.frequency.setValueAtTime(380 * pitch, now);
  osc.frequency.linearRampToValueAtTime(620 * pitch, now + 0.06);
  osc.frequency.exponentialRampToValueAtTime(440 * pitch, now + 0.28);
  osc2.frequency.setValueAtTime(760 * pitch, now);
  osc2.frequency.linearRampToValueAtTime(900 * pitch, now + 0.06);
  osc2.frequency.exponentialRampToValueAtTime(660 * pitch, now + 0.28);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.03);
  gain.gain.setValueAtTime(vol * 0.7, now + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
  gain2.gain.setValueAtTime(0, now);
  gain2.gain.linearRampToValueAtTime(vol * 0.3, now + 0.03);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
  osc.connect(gain); gain.connect(ctx.destination);
  osc2.connect(gain2); gain2.connect(ctx.destination);
  osc.start(now); osc2.start(now);
  osc.stop(now + 0.35); osc2.stop(now + 0.35);
}

// 「啪！」拍球聲
function sfxPat() {
  if (isMuted) return;
  const ctx = getAudioCtx(); const now = ctx.currentTime;
  // 衝擊噪音
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i / (ctx.sampleRate * 0.02));
  const src = ctx.createBufferSource(); src.buffer = buf;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 800;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.35, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  src.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
  src.start(now);
  // 短促 pop tone
  const osc = ctx.createOscillator(); const g2 = ctx.createGain();
  osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
  g2.gain.setValueAtTime(0.2, now); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  osc.connect(g2); g2.connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.12);
}

// 輕巧「叮」鈴聲
function sfxBell(freq = 1800, vol = 0.12) {
  if (isMuted) return;
  const ctx = getAudioCtx(); const now = ctx.currentTime;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type = 'sine'; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.65);
}

function sfxAlien() {

  // 外星人出現：怪異顫音

  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  const gain = ctx.createGain();
  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';

  lfo.start(); osc.start();
  lfo.stop(ctx.currentTime + 1.0); osc.stop(ctx.currentTime + 1.0);
}

const pool = document.getElementById("pool");
let poolWidth = pool.clientWidth;
let poolHeight = pool.clientHeight;

let balls = [];
let smallBalls = [];
let ufo = null;
let animRunning = false;

// Game state
let ballCount = 39;
let drawCount = 5;
let isSpecialBall = false;
let gameType = '539';
let secondPoolCount = 8;   // 威力彩 第二區 固定 1–8
let isSecondPoolEnabled = false;  // 威力彩才有第二區
let phase = 'idle'; // idle | drawn1 | done

// ─── Pool creation ──────────────────────────────────────────
function createPool() {
  pool.innerHTML = "";
  balls = [];
  poolWidth = pool.clientWidth;
  poolHeight = pool.clientHeight;

  for (let i = 1; i <= ballCount; i++) {
    let b = document.createElement("div");
    b.className = "ball";
    b.innerText = String(i).padStart(2,'0');
    let x = Math.random() * (poolWidth - 34);
    let y = Math.random() * (poolHeight - 34);
    b.style.left = x + "px";
    b.style.top = y + "px";
    pool.appendChild(b);
    balls.push({ el: b, x, y, dx: (Math.random()-0.5)*2.5, dy: (Math.random()-0.5)*2.5, num: i, selected: false });
  }

  if (!animRunning) { animRunning = true; animate(); }
}

const SP_W = 120, SP_H = 280;

function createSmallPool() {
  const sp = document.getElementById("small-pool");
  sp.innerHTML = "";
  smallBalls = [];

  const count = isSecondPoolEnabled ? 8 : secondPoolCount;
  for (let i = 1; i <= count; i++) {
    let b = document.createElement("div");
    b.className = "ball";
    b.innerText = String(i).padStart(2,'0');
    b.style.background = "radial-gradient(circle at 35% 30%, #fff 0%, #bf00ff 50%, #4a006a 100%)";
    b.style.color = "#fff";
    b.style.boxShadow = "inset -3px -3px 6px rgba(0,0,0,0.3), inset 3px 3px 6px rgba(255,255,255,0.15), 0 2px 6px rgba(0,0,0,0.5)";
    let x = Math.random() * (SP_W - 34);
    let y = Math.random() * (SP_H - 34);
    b.style.left = x + "px";
    b.style.top = y + "px";
    sp.appendChild(b);
    smallBalls.push({ el: b, x, y, dx: (Math.random()-0.5)*2.2, dy: (Math.random()-0.5)*2.2, num: i, selected: false });
  }
}

// ─── Animation loop ─────────────────────────────────────────
function animate() {
  balls.forEach(b => {
    if (!b.selected) {
      b.x += b.dx; b.y += b.dy;
      if (b.x < 0 || b.x > poolWidth - 34) b.dx *= -1;
      if (b.y < 0 || b.y > poolHeight - 34) b.dy *= -1;
      b.el.style.left = b.x + "px";
      b.el.style.top = b.y + "px";
    }
  });

  if (isSecondPoolEnabled && smallBalls.length) {
    smallBalls.forEach(b => {
      if (!b.selected) {
        b.x += b.dx; b.y += b.dy;
        if (b.x < 0 || b.x > SP_W - 34) b.dx *= -1;
        if (b.y < 0 || b.y > SP_H - 34) b.dy *= -1;
        b.el.style.left = b.x + "px";
        b.el.style.top = b.y + "px";
      }
    });
  }

  requestAnimationFrame(animate);
}

// ─── Draw 第一區 ─────────────────────────────────────────────
function draw() {
  if (phase !== 'idle') return;
  phase = 'drawing';
  sfxDrawStart();
  document.getElementById("drawBtn").disabled = true;
  document.getElementById("result-balls").innerHTML = "";
  document.getElementById("result-second").style.display = "none";
  document.getElementById("result-balls-second").innerHTML = "";

  chosen.forEach(i => { balls[i].el.classList.add("selected"); balls[i].selected = true; });

  // 主角動畫（飛碟 or 招財貓）
  ufo = document.createElement("div");

    ufo.className = "lucky-cat";

      <div class="c-tail"></div>

  }

  let angle = 0, radius = 90, cx = poolWidth/2, cy = poolHeight/2;

    angle += 0.06;
    ufo.style.left = (cx + radius * Math.cos(angle)) + "px";
    ufo.style.top  = (cy + radius * Math.sin(angle) * 0.4) + "px";
    if (currentTheme !== 'cat' && ++spinTick % 40 === 0) sfxUfoSpin();
    if (currentTheme === 'cat' && ++spinTick % 50 === 0) { catSlap(); sfxPat(); }
  }, 16);

  setTimeout(() => {
    clearInterval(spinning);
    if (currentTheme === 'cat') {
      // 招財貓：跑出畫面右下角
      ufo.style.transition = "left 0.7s ease-in, top 0.7s ease-in, opacity 0.5s";
      ufo.style.left = (poolWidth + 60) + "px";
      ufo.style.top  = (poolHeight + 60) + "px";
      ufo.style.opacity = "0";
    } else {
      ufo.style.transition = "left 0.8s ease-in, top 0.8s ease-in, transform 0.8s";
      ufo.style.left = (poolWidth + 80) + "px";

      ufo?.remove(); ufo = null;

      const nums = chosen.map(i => balls[i].num).sort((a,b) => a-b);
      const rb = document.getElementById("result-balls");

      const slots = nums.map(() => {
        const slot = document.createElement("div");
        slot.className = "result-num";
        rb.appendChild(slot);
        return slot;
      });

      let afterReveal = 0;
      nums.forEach((n, i) => {
        const ballObj = balls.find(b => b.num === n);
        const delay = i * 220;
        afterReveal = delay + 600;
        setTimeout(() => {
          flyBall(ballObj.el, slots[i], n, 'gold', i);
          if (i === nums.length - 1) setTimeout(sfxFanfare, 620);
        }, delay);
      });

      afterReveal += 200;

      if (isSpecialBall) {
        setTimeout(() => showAlienAndSpecial(nums), afterReveal);
      } else if (isSecondPoolEnabled) {
        setTimeout(() => {
          phase = 'drawn1';
          const btn = document.getElementById("drawSecondPoolBtn");
          btn.style.display = 'inline-flex';
          btn.disabled = false;
          btn.classList.add('pulse');
        }, afterReveal);

        phase = 'done';

}

// ─── flyBall：球從球池飛到結果槽 ─────────────────────────────
function flyBall(srcEl, slotEl, num, type, index = 0) {
  // 取得來源球的螢幕位置
  const srcRect = srcEl.getBoundingClientRect();
  const dstRect = slotEl.getBoundingClientRect();

  // 建立飛行複製球（fixed定位，可跨越overflow:hidden）
  const fly = document.createElement("div");
  fly.className = "ball" + (type === 'special' ? " special-ball" : "");
  fly.innerText = String(num).padStart(2, '0');
  fly.style.cssText = `
    position: fixed;
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
    z-index: 9999;
    pointer-events: none;
    left: ${srcRect.left}px;
    top: ${srcRect.top}px;
    background: ${type === 'special'
      ? 'radial-gradient(circle at 35% 30%, #fff 0%, #bf00ff 50%, #4a006a 100%)'
      : 'radial-gradient(circle at 35% 30%, #fff8 0%, #ffca00 45%, #b8860b 100%)'};
    color: ${type === 'special' ? '#fff' : '#3a2800'};

    transition: left 0.55s cubic-bezier(0.4,0,0.2,1),
                top 0.55s cubic-bezier(0.4,0,0.2,1),
                transform 0.55s,
                opacity 0.2s;
    transform: scale(1.3);
  `;
  document.body.appendChild(fly);

  // 隱藏來源球
  srcEl.style.opacity = '0';

  sfxBallFly(index);
  // 飛向目標槽
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fly.style.left = (dstRect.left + (dstRect.width - 34) / 2) + "px";
    fly.style.top  = (dstRect.top  + (dstRect.height - 34) / 2) + "px";
    fly.style.transform = "scale(1)";

  // 落地後：顯示結果槽、移除飛行球
  setTimeout(() => {
    slotEl.innerText = String(num).padStart(2, '0');

      smallBalls[cur].el.style.boxShadow = "0 0 0 2px #bf00ff, 0 0 18px #bf00ff, 0 0 40px rgba(191,0,255,0.6)";
      smallBalls[cur].el.style.transform = "scale(1.25)";

      // UFO 移向當前球（用凍結位置）
      const target = smallBalls[cur];
      ufo2.style.transition = "left 0.08s, top 0.08s";
      ufo2.style.left = (target.x + 17) + "px";
      ufo2.style.top  = (target.y - 20) + "px";

      flashIdx++;

      if (flashIdx >= totalFlash) {
        clearInterval(flashInterval);

        // 最後定格到被選中的球
        setTimeout(() => {
          smallBalls.forEach(b => {
            b.el.style.transform = '';
            b.el.style.boxShadow = "inset -3px -3px 6px rgba(0,0,0,0.3), inset 3px 3px 6px rgba(255,255,255,0.15), 0 2px 6px rgba(0,0,0,0.5)";
          });

          // UFO 飛到選中球上方（用凍結位置）
          ufo2.style.transition = "left 0.5s ease-out, top 0.5s ease-out";
          ufo2.style.left = (chosen.x + 17) + "px";
          ufo2.style.top  = (chosen.y - 24) + "px";

          setTimeout(() => {
            // 選中球發光（保持 selected=true 讓它不再移動）
            chosen.el.classList.add("selected");
            chosen.el.style.background = "radial-gradient(circle at 35% 30%, #fff 0%, #bf00ff 50%, #4a006a 100%)";
            chosen.el.style.boxShadow = "0 0 0 2px #bf00ff, 0 0 24px #bf00ff, 0 0 60px rgba(191,0,255,0.7)";
            chosen.el.style.transform = "scale(1.5)";
            chosen.el.style.transition = "transform 0.4s, box-shadow 0.4s";
            // 其他球恢復移動
            smallBalls.forEach(b => { if (b !== chosen) b.selected = false; });

            // UFO 飛走
            setTimeout(() => {
              if (currentTheme === 'cat') {
                ufo2.style.transition = "left 0.5s ease-in, top 0.5s ease-in, opacity 0.4s";
                ufo2.style.left = (SP_W + 50) + "px";
                ufo2.style.top  = (SP_H + 50) + "px";
                ufo2.style.opacity = "0";
              } else {
                ufo2.style.transition = "left 0.6s ease-in, top 0.6s ease-in, transform 0.6s";
                ufo2.style.left = (SP_W + 60) + "px";
                ufo2.style.top  = "-40px";
                ufo2.style.transform = "translate(-50%,-50%) scale(0.2)";
              }

              setTimeout(() => {
                ufo2.remove();
                // 顯示第二區，球飛過去
                document.getElementById("result-second").style.display = "block";
                const rb2 = document.getElementById("result-balls-second");
                rb2.innerHTML = "";
                const slot2 = document.createElement("div");
                slot2.className = "result-num special";
                slot2.title = "第二區";
                rb2.appendChild(slot2);
                setTimeout(() => {
                  flyBall(chosen.el, slot2, chosen.num, 'special', 0);
                  setTimeout(() => { phase = 'done'; }, 700);
                }, 100);
              }, 700);
            }, 600);
          }, 500);
        }, 200);
      }
    }, 90); // 每顆球閃爍間隔（90ms，3輪共 8*3*90 ≈ 2.2s）
  }, 2000);
}

// ─── Reset ───────────────────────────────────────────────────
function resetPool() {
  phase = 'idle';
  document.getElementById("drawBtn").disabled = false;
  document.getElementById("result-balls").innerHTML = "";
  document.getElementById("result-second").style.display = "none";
  document.getElementById("result-balls-second").innerHTML = "";

  // 威力彩的「抽第二區」按鈕：重置時隱藏，等第一區抽完才出現
  const btn = document.getElementById("drawSecondPoolBtn");
  btn.style.display = 'none';
  btn.disabled = true;
  btn.classList.remove('pulse');

  if (ufo) { ufo.remove(); ufo = null; }
  createPool();
  if (isSecondPoolEnabled) {
    setTimeout(() => createSmallPool(), 50); // small delay so pool has dimensions
  }
}

// ─── Game switch ─────────────────────────────────────────────
function switchGame(type, tabEl) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');

  gameType = type;
  applyGameDefaults(type);
  syncModalToState();
  resetPool();
}

function applyGameDefaults(type) {
  switch(type) {
    case '539':
      ballCount=39; drawCount=5; isSpecialBall=false; isSecondPoolEnabled=false;
      break;
    case 'lt':
      ballCount=49; drawCount=6; isSpecialBall=true; isSecondPoolEnabled=false;
      break;
    case 'wp':
      // 威力彩：第一區 01–38 選6，第二區 01–08 選1（必須）
      ballCount=38; drawCount=6; isSpecialBall=false; isSecondPoolEnabled=true; secondPoolCount=8;
      break;
    case 'custom':
      break;
  }

  // Update pool info label
  let infoText = `1–${ballCount} / 抽${drawCount}顆`;
  if (type === 'wp') infoText = '第一區 01–38 / 抽6顆';
  document.getElementById('pool-info').textContent = infoText;

  // Show/hide second pool area (always visible for wp, hidden otherwise unless custom enables it)
  const spw = document.getElementById('small-pool-wrapper');
  spw.style.display = isSecondPoolEnabled ? 'flex' : 'none';
}

function syncModalToState() {
  document.getElementById('game-type').value = gameType;
  document.getElementById('ball-count').value = ballCount;
  document.getElementById('draw-count').value = drawCount;
  document.getElementById('special-ball').checked = isSpecialBall;
  document.getElementById('second-pool-enabled').checked = isSecondPoolEnabled;
  document.getElementById('second-pool').value = secondPoolCount;
}

// ─── Settings modal ──────────────────────────────────────────
function openSettings() {
  syncModalToState();
  onGameTypeChange();
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function maybeClose(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}

function onGameTypeChange() {
  const val = document.getElementById('game-type').value;
  const isCustom = val === 'custom';
  const isLt = val === 'lt';
  const isWp = val === 'wp';

  // 根據遊戲類型填入正確的預設值（含勾選狀態）
  // 自訂模式：若目前已是自訂，保留現有值（記憶上次設定）；否則填預設
  const defaults = {
    '539': { bc: 39, dc: 5, sb: false, spe: false, sp: 8 },
    'lt':  { bc: 49, dc: 6, sb: true,  spe: false, sp: 8 },
    'wp':  { bc: 38, dc: 6, sb: false, spe: true,  sp: 8 },
  };
  if (val === 'custom' && gameType === 'custom') {
    // 已是自訂：把目前的 state 填回表單（保持上次設定）
    document.getElementById('ball-count').value = ballCount;
    document.getElementById('draw-count').value = drawCount;
    document.getElementById('special-ball').checked = isSpecialBall;
    document.getElementById('second-pool-enabled').checked = isSecondPoolEnabled;
    document.getElementById('second-pool').value = secondPoolCount;
  } else if (val === 'custom') {
    // 從其他模式切到自訂：預設不啟用第二球池
    document.getElementById('ball-count').value = ballCount;
    document.getElementById('draw-count').value = drawCount;
    document.getElementById('special-ball').checked = false;
    document.getElementById('second-pool-enabled').checked = false;
    document.getElementById('second-pool').value = secondPoolCount;
  } else if (defaults[val]) {
    const d = defaults[val];
    document.getElementById('ball-count').value = d.bc;
    document.getElementById('draw-count').value = d.dc;
    document.getElementById('special-ball').checked = d.sb;
    document.getElementById('second-pool-enabled').checked = d.spe;
    document.getElementById('second-pool').value = d.sp;
  }

  document.getElementById('ball-count').disabled = !isCustom;
  document.getElementById('draw-count').disabled = !isCustom;
  document.getElementById('lt-options').style.display = (isLt || isCustom) ? 'block' : 'none';
  document.getElementById('wp-options').style.display = (isWp || isCustom) ? 'block' : 'none';
  document.getElementById('special-ball').disabled = !isCustom;
  document.getElementById('second-pool-enabled').disabled = !isCustom;
  document.getElementById('second-pool').disabled = !isCustom || !document.getElementById('second-pool-enabled').checked;
}

function toggleSecondPoolOptions() {
  const checked = document.getElementById('second-pool-enabled').checked;
  document.getElementById('second-pool').disabled = !checked;
}

function saveSettings() {
  const type = document.getElementById('game-type').value;
  gameType = type;

  if (type === 'custom') {
    const bc = parseInt(document.getElementById('ball-count').value);
    const dc = parseInt(document.getElementById('draw-count').value);
    const sb = document.getElementById('special-ball').checked;
    const spe = document.getElementById('second-pool-enabled').checked;
    const sp = parseInt(document.getElementById('second-pool').value);

    let err = '';
    if (isNaN(bc) || bc < 1 || bc > 100) err = '球數量必須在 1–100 之間。';
    else if (isNaN(dc) || dc < 1 || dc > 10) err = '抽獎號碼數量必須在 1–10 之間。';
    else if (bc < dc) err = '球數量不能小於抽獎號碼數量。';
    else if (sb && bc < dc + 1) err = '選特別號後球數量不足（含特別號）。';
    else if (spe && (isNaN(sp) || sp < 1 || sp > 8)) err = '第二球池數量必須在 1–8 之間。';

    if (err) { document.getElementById('error-msg').textContent = err; return; }
    document.getElementById('error-msg').textContent = '';

    ballCount = bc; drawCount = dc; isSpecialBall = sb;
    isSecondPoolEnabled = spe; secondPoolCount = sp;
  } else {
    applyGameDefaults(type);
  }

  // Sync tab highlight
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['539','lt','wp','custom'][i] === gameType);
  });

  // 自訂模式不呼叫 applyGameDefaults（避免蓋掉已設定的值）
  // 只更新 UI 顯示狀態
  if (gameType !== 'custom') {
    applyGameDefaults(gameType);
  } else {
    // 自訂：手動更新 pool-info 與第二球池顯示
    document.getElementById('pool-info').textContent = `1–${ballCount} / 抽${drawCount}顆`;
    const spw = document.getElementById('small-pool-wrapper');
    spw.style.display = isSecondPoolEnabled ? 'flex' : 'none';
    const btn = document.getElementById('drawSecondPoolBtn');
    btn.style.display = 'none'; // 重置時隱藏，等第一區抽完才出現
  }

  closeSettings();
  resetPool();
}


// ─── Theme ───────────────────────────────────────────────────
let currentTheme = 'alien';

function setTheme(t) {
  currentTheme = t;
  document.body.className = 'theme-' + t;
  document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
  document.getElementById('opt-' + t).classList.add('active');
  // 更新版型按鈕 icon
  document.getElementById('themeBtn').innerText = t === 'cat' ? '🐱' : '👽';
  // cat theme: 標題改中文
  const logo = document.querySelector('.logo');
  const sub = document.querySelector('.subtitle');
  if (t === 'cat') {
    logo.innerHTML = '貓貓 <span>財神</span>';
    sub.textContent = '喵～財運滾滾來';
  } else {
    logo.innerHTML = 'LUCKY <span>DRAW</span>';
    sub.textContent = 'Taiwan Lottery Simulator';
  }
  closeThemePanel();
}

function toggleThemePanel() {
  document.getElementById('themePanel').classList.toggle('open');
}

function closeThemePanel() {
  document.getElementById('themePanel').classList.remove('open');
}

// 點擊面板外關閉
document.addEventListener('click', e => {
  const panel = document.getElementById('themePanel');
  const btn = document.getElementById('themeBtn');
  if (!panel.contains(e.target) && e.target !== btn) closeThemePanel();
});

// 初始化版型
setTheme('alien');

// ─── Init ────────────────────────────────────────────────────
createPool();
</script>
